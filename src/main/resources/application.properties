spring.application.name=redis-rate-limiter
server.port=8080

# Dynamic Connection with Fallback to Localhost
spring.data.redis.host=${SPRING_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}

# ? SSL ENABLER FOR AIVEN CLOUD (Yeh fix karega handshake failure)
spring.data.redis.ssl.enabled=${SPRING_REDIS_SSL_ENABLED:false}

# Actuator Endpoints Exposure
management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.tags.application=rate-limiter-service